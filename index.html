<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LatentSearch</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600&family=Sora:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔍</text></svg>">
</head>
<body class="home-page">
    <!-- Header -->
    <header class="home-header">
    </header>

    <!-- Main Content -->
    <main class="home-main">
        <div class="logo-container">
            <span class="logo-L">L</span><span class="logo-a">a</span><span class="logo-t">t</span><span class="logo-e">e</span><span class="logo-n">n</span><span class="logo-t2">t</span><span class="logo-S">S</span><span class="logo-e2">e</span><span class="logo-a2">a</span><span class="logo-r">r</span><span class="logo-c">c</span><span class="logo-h">h</span>
        </div>

        <div class="search-container">
            <form action="search.html" method="GET" id="search-form">
                <div class="search-box">
                    <div class="search-icon">
                        <svg focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20">
                            <path fill="#9aa0a6" d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                        </svg>
                    </div>
                    <input type="text" name="q" class="search-input" autocomplete="off" autofocus title="Search" aria-label="Search">
                    <div class="search-right-icons">
                        <button type="button" class="camera-btn" title="Search by image">
                            <svg viewBox="0 0 192 192" width="24" height="24">
                                <rect fill="none" height="192" width="192"/>
                                <g>
                                    <circle fill="rgba(255,255,255,0.45)" cx="144" cy="144" r="16"/>
                                    <circle fill="rgba(255,255,255,0.65)" cx="96" cy="96" r="16"/>
                                    <circle fill="rgba(255,255,255,0.55)" cx="48" cy="48" r="16"/>
                                    <circle fill="rgba(255,255,255,0.35)" cx="48" cy="144" r="16"/>
                                    <circle fill="rgba(255,255,255,0.75)" cx="144" cy="48" r="16"/>
                                </g>
                            </svg>
                        </button>
                    </div>
                </div>
            </form>
            <div class="search-buttons">
                <button type="submit" form="search-form" class="search-btn" data-i18n="searchBtn">LatentSearch Search</button>
                <button type="button" class="lucky-btn" data-i18n="luckyBtn">I'm Feeling Lucky</button>
            </div>
        </div>

        <div class="language-links">
            <span data-i18n="offeredIn">LatentSearch offered in:</span> <a href="#" class="lang-link" data-lang="en">English</a> <a href="#" class="lang-link" data-lang="es">Español</a> <a href="#" class="lang-link" data-lang="fr">Français</a> <a href="#" class="lang-link" data-lang="de">Deutsch</a> <a href="#" class="lang-link" data-lang="ja">日本語</a>
        </div>
    </main>

    <!-- Footer -->
    <footer class="home-footer">
        <div class="footer-bottom">
            <div class="footer-left">
                <span class="footer-made-by">Made by <a href="https://floridomeacci.xyz" target="_blank" rel="noopener" class="footer-credit">floridomeacci.xyz</a></span>
            </div>
            <div class="footer-right">
                <span class="footer-disclaimer">LatentSearch is an independent AI search experiment, not affiliated with anyone. Everything you see is AI generated.</span>
            </div>
        </div>
    </footer>

    <script src="js/config.js"></script>
    <script src="js/app.js"></script>
    <script type="module" src="js/haptics.js"></script>
</body>
</html>
