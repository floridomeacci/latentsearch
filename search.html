<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LatentSearch</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600&family=Sora:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔍</text></svg>">
</head>
<body class="results-page">
    <!-- Header -->
    <header class="results-header">
        <div class="results-header-top">
            <a href="index.html" class="results-logo">
                <span class="logo-sm-L">L</span><span class="logo-sm-a">a</span><span class="logo-sm-t">t</span><span class="logo-sm-e">e</span><span class="logo-sm-n">n</span><span class="logo-sm-t2">t</span><span class="logo-sm-S">S</span><span class="logo-sm-e2">e</span><span class="logo-sm-a2">a</span><span class="logo-sm-r">r</span><span class="logo-sm-c">c</span><span class="logo-sm-h">h</span>
            </a>
            <div class="results-search-container">
                <form action="search.html" method="GET" id="results-search-form">
                    <div class="results-search-box">
                        <div class="search-icon">
                            <svg focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20">
                                <path fill="#9aa0a6" d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                            </svg>
                        </div>
                        <input type="text" name="q" class="search-input" id="results-search-input" autocomplete="off" title="Search" aria-label="Search">
                        <div class="search-right-icons">
                            <button type="button" class="clear-btn" id="clear-btn" title="Clear" style="display:none;">✕</button>
                            <button type="button" class="camera-btn" title="Search by image">
                                <svg viewBox="0 0 192 192" width="24" height="24">
                                    <rect fill="none" height="192" width="192"/>
                                    <g>
                                        <circle fill="#ccc" cx="144" cy="144" r="16"/>
                                        <circle fill="#DC2626" cx="96" cy="96" r="16"/>
                                        <circle fill="#999" cx="48" cy="48" r="16"/>
                                        <circle fill="#bbb" cx="48" cy="144" r="16"/>
                                        <circle fill="#DC2626" cx="144" cy="48" r="16"/>
                                    </g>
                                </svg>
                            </button>
                        </div>
                    </div>
                </form>
            </div>

        </div>
        <nav class="results-nav">
            <a href="search.html" class="nav-item active" id="nav-all">
                <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                All
            </a>
            <a href="#" class="nav-item" id="nav-images" onclick="switchToImages(event)">
                <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M14 13l4 5H6l4-4 1.79 2.15L14 13zm-6.01-2c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm0-6C4.49 5 2 7.49 2 11v8c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V5H8z"/></svg>
                Images
            </a>

        </nav>
    </header>

    <!-- Search Results -->
    <main class="results-main" id="results-main">
        <div class="results-stats" id="results-stats"></div>
        <div id="search-results" class="search-results"></div>

        <!-- Pagination -->
        <div class="pagination" id="pagination">
            <div class="pagination-logo">
                <span class="logo-sm-L">L</span><span class="logo-sm-a">a</span><span class="logo-sm-t">t</span><span class="logo-sm-e">e</span><span class="logo-sm-n">n</span><span class="logo-sm-t2">t</span><span class="logo-sm-S">S</span><span class="logo-sm-e2">e</span><span class="logo-sm-a2">a</span><span class="logo-sm-r">r</span><span class="logo-sm-c">c</span><span class="logo-sm-h">h</span>
            </div>
            <div class="pagination-links">
                <span class="page-current">1</span>
                <a href="#" class="page-link">2</a>
                <a href="#" class="page-link">3</a>
                <a href="#" class="page-link">4</a>
                <a href="#" class="page-link">5</a>
                <a href="#" class="page-link">6</a>
                <a href="#" class="page-link">7</a>
                <a href="#" class="page-link">8</a>
                <a href="#" class="page-link">9</a>
                <a href="#" class="page-link">10</a>
                <a href="#" class="page-link next-link">Next &gt;</a>
            </div>
        </div>
    </main>

    <!-- Image Results (hidden by default) -->
    <main class="images-main" id="images-main" style="display: none;">
        <div class="image-results-grid" id="image-results"></div>
    </main>

    <!-- Footer -->
    <footer class="results-footer">
        <div class="footer-bottom">
            <div class="footer-left">
                <span class="footer-made-by">Made by <a href="https://floridomeacci.xyz" target="_blank" rel="noopener" class="footer-credit">floridomeacci.xyz</a></span>
            </div>
            <div class="footer-right">
                <span class="footer-disclaimer">LatentSearch is an independent AI search experiment, not affiliated with anyone. Everything you see is AI generated.</span>
            </div>
        </div>
    </footer>

    <script src="js/config.js"></script>
    <script src="js/app.js"></script>
    <script src="js/search.js"></script>
    <script type="module" src="js/haptics.js"></script>
</body>
</html>
